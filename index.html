<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        header {
            color: white;
            padding: 30px;
            margin-left: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            background-color: lightcyan;
            width: 100%;
            margin: 0;
            padding: 50px;
        }        

        /* 1. Responsive Navigation Bar */
        .page-logo {
            width: 100%;
            max-width: 50px;
            height: 100%;
            max-height: 50px;
            border-radius: 50%;
        }

        nav {
            display: flex;
            justify-content: flex-start;
            background-color: cadetblue;
            flex-wrap: wrap;
        }
        
        .nav-links {
            display: flex;
            justify-content: space-around;
            list-style: none;
            padding:0;
            color: blue;  
            flex-wrap: wrap;
        }
        
        .nav-links li{
            margin-left: 20px;
        }

        @media (max-width: 600px) {
            nav {
                flex-direction: column;   /* stack logo + links */
                align-items: flex-start;
            }

            .nav-links {
                display: flex;                
                flex-direction: column;   /* links vertical */

                width: 100%;
            }

            .nav-links li {
                margin: 10px 0;
            }
        }          

        .nav-links li:hover {
            font-weight: bold;
            border-radius: 5px;
            background-color: gainsboro;
        }

        main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;            
        }

        .prjTitle{
            display: flex;
            justify-content: center;
            color: cadetblue;            
        }
        .searchBar {
            align-items: center;
            width: 100%;
            max-width: 20rem;            
        }
        #inputSearch{
            display:flex;
            justify-content: center;
            width: 100%;
            max-width: 300px;
        }

        .not-found-message {
            display: flex;
            justify-content: center;
            color: gray;
            font-style: italic;
        }        
        .projects{
            display: flex;
            justify-content: center;
            column-gap: 20px;
            flex-wrap: wrap;            
        }

        /* Feature/Project Card Info */
        .card {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto auto auto auto auto;
            justify-items: center;
            gap: 15px;
            width: 100%;
            max-width: 350px;            
            padding: 2px;
            border: 1px solid #ccc;
            background-color: rgb(166, 192, 191);
            box-shadow: 2px 2px 10px gray;
            transition: transform 0.3s;
            flex-wrap: wrap;
        }

        @media (max-width: 600px) {
            .projects {
                flex-direction: column;   /* cards go one under another */
                align-items: center;
            }

            .card {
                width: 90%;   /* bigger on small screens */
            }
        }        
        .card:hover {
            transform: scale(1.05);
        }
        .card img {
            grid-column: 1;
            grid-row: 1;
            width: 20%;
            max-width: 50px;
            max-height: 30px;
            align-items: center;
        }

        .badge {
            grid-column: 1;
            grid-row: 2;
            background-color: white;
            text-align: justify;
            border-radius: 5px;
            color: rgb(166, 192, 191);
            padding: 5px ;
            font-size: 15px;
            font-weight: bold;
            width: fit-content;
        }        

        .title {
            grid-column: 1;
            grid-row: 3;
            color: white;
            font-weight: bold;
        }         

        .desc {
            display: flex;
            justify-content: center;
            grid-column: 1;
            grid-row: 4;
            font-size: large;
            font-weight: lighter;
            color: white;
            margin:10px;
        }        

        .btn {
            grid-column: 1;
            grid-row: 5;        
            color: darkorchid;    
            font-size: medium;
        }        

        button {
            background-color: cadetblue;
            color: white;
            border-radius: 5px;
            border: none;
            width: 100%;
            max-width: 100;
            padding: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Contact Form  */
        .contact-form {
            display: block;
            align-items: center;
            margin-top: 20px;
            width: 100%;
            max-width: 600px;

        }
        .contact-form label {
            margin-left: 10px;
            font-weight: bold;          
        }

        input, select, textarea {
            margin:0;
            margin-bottom: 10px;
            margin-left: 10px;
            padding: 10px;
            width: 100%;
            /* max-width: 600px; */
            border-radius: 5px;
        }

        /* textarea{
            
        } */

        input:focus, inputSearch:focus, select:focus, textarea:focus {
            border: 2px solid green;
            background-color: lightyellow;
            outline: none;
        }

        .contact-form button {
            background-color: cadetblue;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            border: none;
            align-items: center;
            margin-left: 20px;
            width: 100%;
            padding: 20px;
            cursor: pointer;
        }        
        .contact-form h2 {
            color: teal;
        }
    </style>
</head>

<body>
    <!-- 1. Responsive Navigation Bar -->
    <div>
        <nav>
            <img src="images/bank-logo.jpg" alt="This is our project's logo designed for the bank." class="page-logo">
            <h3>Banking Projects Innovation</h3>

            <ul class="nav-links">  
                <li><a href="#">Home</a></li>
                <li><a href="http://www.linkedin.com/in/ZMadjidi">LinkedIn</a></li>
                <li><a href="https://github.com/zamzame">GitHub</a></li>
                <li><a href="#">About Me</a></li>
            </ul>
        </nav>
    </div>

    <!-- 2. Project Card -->        
    <main>
        <section class="searchBar">
            <h1 class="prjTitle">My Projects</h1>
            <input type="text" id="inputSearch" placeholder="Search by title">
            <h4 class="not-found-message"></h4>
        </section>
        <br><br>

        <section class="projects">

        </section>
        <br><br>        
        <!-- 3. Contact Form (Accessible)-->
        <section class="contact-form">
            <head>
                <h2>Contact Me</h2>
            </head>
            <form>
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required placeholder="fullname: e.g. Aman Aghajani"><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required placeholder="email: e.g. example@domain.com"><br><br>
                
                <label for="subject">Subject:</label><br>
                <select id="subject" required>
                    <option value="">Choose one</option>
                    <option value="web">Web Design</option>
                    <option value="support">Support</option>
                </select>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" required placeholder="your message"></textarea><br><br>
                

                <button type="submit" style="display: block;">Submit</button><br>                
            </form>
        </section>        
    </main>
    <script>
        // Repository
        const myProjects = [
            {   //1
                imgSrc : "images/core-banking.jpg",
                alt    : "bill payment provide solutions ensureing safe payment transactions.",
                badge  : "Web Design Features",
                title  : "Core-banking",
                desc   : "A bill payment system is" + 
                        "a secure electronic service allowing individuals and businesses" +
                        "to pay recurring or one-time invoices—such as utilities," +
                        "rent, or credit cards—directly from a bank account or through digital platforms." +
                        "It automates payments, facilitates scheduling, and " +
                        "serves as a digital alternative to paper checks." + 
                        "The process usually involves the user adding a payee," + 
                        "inputting payment details, and the system initiating the transfer through" + 
                        "the Automated Clearing House (ACH) or similar secure channels."
            },
            {   //2 
                imgSrc : "images/aml.jpg",
                alt    : "AML is using to control anti-money laundering through banking operations.",
                badge  : "Backend Implementation",
                title  : "Anti-Money Laundering (AML)",
                desc   : "Anti-Money Laundering (AML) system is a comprehensive framework of laws," + 
                            "regulations, and procedures designed to prevent criminals from disguising illegal funds" + 
                            "as legitimate income. It requires financial institutions to monitor transactions," + 
                            "verify customer identities, and report suspicious activities to detect" + 
                            "and stop financial crime. " +
                            "AML systems combat the laundering process—typically involving placement," + 
                            "layering, and integration—to prevent the misuse of the financial system for" + 
                            "money laundering or terrorist financing. "
            },
            {   //3
                imgSrc : "images/bill-payment.jpg",
                alt    : "bill payment provide solutions ensureing safe payment transactions.",
                badge  : "Web Application",
                title  : "Bill Payments",
                desc   : "A bill payment system is" +
                            "a secure electronic service allowing individuals and businesses " +
                            "to pay recurring or one-time invoices—such as utilities, " +
                            "rent, or credit cards—directly from a bank account or through digital platforms. " +
                            "It automates payments, facilitates scheduling, and " +
                            "serves as a digital alternative to paper checks. " +
                            "The process usually involves the user adding a payee," + 
                            "inputting payment details, and the system initiating the transfer through " +
                            "the Automated Clearing House (ACH) or similar secure channels."
            },
            {   //4 
                imgSrc : "images/aml.jpg",
                alt    : "Fraud Detection is using to control fraud detection through banking operations.",
                badge  : "Backend and UI",
                title  : "Fraud Detection",
                desc   : "Fraud Detection system is a comprehensive framework of laws," + 
                            "regulations, and procedures designed to prevent criminals from disguising illegal funds" + 
                            "as legitimate income. It requires financial institutions to monitor transactions," + 
                            "verify customer identities, and report suspicious activities to detect" + 
                            "and stop financial crime. " +
                            "AML systems combat the laundering process—typically involving placement," + 
                            "layering, and integration—to prevent the misuse of the financial system for" + 
                            "money laundering or terrorist financing. "
            }                                                            
        ]
        
        //Dynamic Cards 
        const prjContainer = document.querySelector(".projects");
        
        function displayProjects(myProjects){

            prjContainer.innerHTML='';

            myProjects.forEach((project)=>{

                const card= document.createElement("article");
                card.className="card";
                card.classList.add("card");
                    
                const imgSrc=document.createElement("img");
                imgSrc.src= project.imgSrc;
                imgSrc.alt= project.alt;
                card.appendChild(imgSrc);

                const badge=document.createElement("span");
                badge.textContent=project.badge;
                badge.className= "badge";
                card.appendChild(badge);

                const title=document.createElement("h3");
                title.textContent=project.title;
                title.className="title";
                card.appendChild(title);

                const desc =document.createElement("p");
                desc.textContent=project.desc;
                desc.className="desc";
                card.appendChild(desc);

                const btn=document.createElement("button");
                btn.type="submit";
                btn.textContent="View Project";
                card.appendChild(btn);

                prjContainer.appendChild(card);                    
            });
        
        }

        //Handeling Searchbar
        const searchInput = document.querySelector("#inputSearch");
        const filteredProject = myProjects.slice();
        
        searchInput.addEventListener("input", ()=> {
            const searchValue = searchInput.value.trim().toLowerCase();



            if (searchValue.length != 0){ 
                //Searching through title and badge of the projects
                const filteredProject = myProjects.filter(project => 
                        project.title.toLowerCase().includes(searchValue)||
                        project.badge.toLowerCase().includes(searchValue)
                    );
                    
                const notFoundMsg= document.querySelector("h4");
                notFoundMsg.textContent="No projects has been found!";
                     
                if (filteredProject.length===0){
                    notFoundMsg.textContent="No projects has been found!";

                } else
                {
                    notFoundMsg.textContent = '';

                }
                displayProjects(filteredProject);                
            }
            else {
                       
                displayProjects(filteredProject); 
            }
        });

        displayProjects(filteredProject);
    </script>    
</body>
