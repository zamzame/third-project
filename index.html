<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">

</head>

<body>

    <!-- 1. Responsive Navigation Bar -->
    <div>
        <nav>
            <img src="images/bank-logo.jpg" alt="This is our project's logo designed for the bank." class="page-logo">
            <!-- <h3>Banking Projects Innovation</h3> -->
            <h3 id="fullname">Zamzameh Madjidi</h3>

            <ul class="nav-links">  
                <li>
                    <a href="#">
                        <img src="images/home-logo.png" alt="jumping to home section" class="home-logo">
                    </a>
                </li>
                <!-- <li><a href="http://www.linkedin.com/in/ZMadjidi">LinkedIn</a></li> -->
                <li>
                    <a href="http://www.linkedin.com/in/ZMadjidi">
                        <img src="images/linkedin-logo.png" alt="repesenting Zamzameh Madjidi's LinkedIn profile" class="linkedin-logo">
                    </a>
                </li>                 
                <li>
                    <a href="https://github.com/zamzame">
                        <img src="images/github-logo.png" alt="repesenting Zamzameh Madjidi's GitHub profile" class="github-logo">
                    </a>
                </li>
                <li>
                    <a href="mailto:z_madjidi@yahoo.com">
                        <img src="images/mail.png" alt="sent an email to Zamzameh Madjidi's yahoo email address." class="mail-logo">
                    </a>
                </li>
            </ul>
        </nav>
    </div>
  
    <main>
        <!-- About Me -->
        <div>
            <section class="about-me">
                <figure class="my-img-container">
                    <img src="images/Me.jpeg" alt="Zamzameh Madjidi's photo" class="my-photo">
                </figure>
                <h3 id="aboutMe"></h3>            
            </section>
        </div>

        <!-- search bar -->
        <div>
            <section class="searchBar">
                <h1 class="prjTitle">My Projects</h1>
                <input type="text" id="inputSearch" placeholder="Search by title">
            </section>
        </div>
        
        <!-- 2. Project Card -->   
        <div>        
            <section class="projects">

            </section>
        </div>

        <!-- 3. Contact Form (Accessible)-->
        <section class="contact-form">
            <head>
                <h2>Contact Me</h2>
            </head>
            <form>
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required placeholder="fullname: e.g. Aman Aghajani"><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required placeholder="email: e.g. example@domain.com"><br><br>
                
                <label for="subject">Subject:</label><br>
                <select id="subject" required>
                    <option value="">Choose one</option>
                    <option value="web">Web Design</option>
                    <option value="support">Support</option>
                </select>

                <label for="message">Message:</label><br>
                <textarea id="message" style="width: 250px; height: 150px;" name="message" required placeholder="your message"></textarea><br><br>

                <button type="submit" style="display: block;">Submit</button><br>                
            </form>
        </section>        
    </main>

    <script type="module" src="scripts/main.js"></script>
</body>
